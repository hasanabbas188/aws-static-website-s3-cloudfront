<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Drip Co - Error</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #fff0f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        color: #333;
    }

    .box {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        max-width: 400px;
    }

    h1 {
        font-size: 60px;
        color: #ff69b4;
        margin: 0;
    }

    h2 {
        margin: 10px 0;
        color: #ff1493;
    }

    p {
        font-size: 14px;
        color: #666;
    }

    a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: #ff69b4;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.2s;
    }

    a:hover {
        background: #ff1493;
    }

    .heart {
        font-size: 30px;
        margin-top: 10px;
    }
</style>

</head>
<body>

<div class="box">
    <h1>404</h1>
    <h2>Oops! Page not found 💔</h2>
    <p>The page you’re looking for doesn’t exist or has been moved.</p>

    <div class="heart">💖 MH Drip Co</div>

    <a href="index.html">Go Back Home</a>
</div>

</body>
</html>
